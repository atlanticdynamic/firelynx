edition = "2023";

package settings.v1alpha1.apps.v1;

option go_package = "github.com/atlanticdynamic/firelynx/gen/settings/v1alpha1/apps/v1";

// MCP (Model Context Protocol) server configuration.
// Represents a user-configurable MCP server that exposes firelynx app-backed tools
// via the mcp-io abstraction layer. Prompt and resource fields are reserved for
// follow-up work and are not currently supported by the runtime gateway.
// MCP servers are routed to via endpoints/routes like other firelynx apps.
message McpApp {
  // Tools that map firelynx apps to MCP tool primitives
  // env_interpolation: n/a (non-string)
  repeated McpTool tools = 1;

  // Reserved for future prompts that map firelynx apps to MCP prompt primitives.
  // Runtime gateway support is not implemented yet.
  // env_interpolation: n/a (non-string)
  repeated McpPrompt prompts = 2;

  // Reserved for future resources that map firelynx apps to MCP resource primitives.
  // Runtime gateway support is not implemented yet.
  // env_interpolation: n/a (non-string)
  repeated McpResource resources = 3;
}

// MCP tool primitive that maps to a firelynx app
message McpTool {
  // Firelynx app ID that provides the tool functionality
  // env_interpolation: no (app ID)
  string app_id = 1;

  // JSON Schema for tool input validation
  // env_interpolation: no (JSON schema content)
  string input_schema = 2;

  // Reserved/advisory JSON Schema for tool output validation.
  // The runtime currently validates this as JSON but does not forward it to MCP clients.
  // env_interpolation: no (JSON schema content)
  string output_schema = 3;

  // Optional tool name override. When empty, the gateway uses the
  // backing app's MCPToolName(). Set this to expose a friendlier MCP
  // tool name distinct from the app_id.
  // env_interpolation: no (tool ID)
  string id = 4;
}

// MCP prompt primitive that maps to a firelynx app
message McpPrompt {
  // Unique identifier for this prompt
  // env_interpolation: no (prompt ID)
  string id = 1;

  // Firelynx app ID that provides the prompt functionality
  // env_interpolation: no (app ID)
  string app_id = 2;

  // JSON Schema for prompt input validation
  // env_interpolation: no (JSON schema content)
  string input_schema = 3;
}

// MCP resource primitive that maps to a firelynx app
message McpResource {
  // Unique identifier for this resource
  // env_interpolation: no (resource ID)
  string id = 1;

  // Firelynx app ID that provides the resource functionality
  // env_interpolation: no (app ID)
  string app_id = 2;

  // URI template for resource addressing
  // env_interpolation: no (URI template)
  string uri_template = 3;
}
